name: daily-screen

# 毎営業日（月〜金）18:00 JST = 09:00 UTC に実行。手動実行(workflow_dispatch)も可。
on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write   # 結果JSONをコミットして push するために必要

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: スクリーニング実行（latest_screen.json を生成）
        run: python precompute.py

      - name: 結果をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_screen.json
          git diff --staged --quiet || git commit -m "chore: update screening $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push
