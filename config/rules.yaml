# =====================================================================
# スクリーニング・ルール設定
# このファイルの値を変更すれば、コードを編集せずに閾値を調整できます。
# =====================================================================

# --- データ取得 ---
data:
  period: "300d"          # yfinanceから取得する期間（200日線計算に十分な長さ）
  max_retries: 3          # 1銘柄あたりの取得リトライ回数
  retry_wait_sec: 2       # リトライ初期待機秒（指数バックオフ）
  request_pause_sec: 1.0  # 実通信時のリクエスト間隔（API負荷軽減。225銘柄向けに余裕を持たせる）

# --- 条件1: トレンド（25MAが上向き） ---
trend:
  ma_window: 25           # 移動平均の期間
  slope_lookback: 5       # 何営業日前と比較して上向き判定するか

# --- 条件2: 押し目（RSIレンジ） ---
rsi:
  period: 14              # RSIの期間（Wilder平滑）
  min: 35.0               # RSI下限（含む）
  max: 45.0               # RSI上限（含む）

# --- 条件3: 出来高 ---
volume:
  avg_window: 20          # 平均出来高の期間
  # 直近の出来高 >= 過去avg_window日平均 で通過

# --- 資金・リスク管理（株数計算に使用） ---
risk:
  total_capital: 1000000  # 総資金（円）
  risk_ratio: 0.005       # 1トレードあたりの許容リスク割合（紙トレードは0.5%=0.005で開始）

# --- 損切り価格の算出 ---
stop_loss:
  pct: 0.07               # 終値からの下落率（7% = 0.07）
  low_lookback: 10        # 直近何日の安値を使うか
  # 損切り価格 = max(終値 × (1 - pct), 直近low_lookback日の安値)

# --- バックテスト（backtest.py で使用） ---
backtest:
  history_period: "540d"   # 取得期間（約18ヶ月。テスト窓＋指標ウォームアップ）
  regime_history_period: "1000d"  # マクロ判定用の^N225取得期間（200日線がテスト全域で定義されるよう長めに）
  long_history_period: "5y"       # 長期検証用の株価取得期間（約5年）
  long_regime_period: "max"       # 長期検証用の^N225取得期間（200日線が5年窓の頭から定義されるよう最大）
  stop_pct: 0.07           # 損切り幅 -7%（= 1R の定義）
  target_pct: 0.15         # 利確 +15%
  max_hold_days: 20        # 時間切れ（営業日。エントリー日を0日目として数える）
  entry: "next_open"       # 約定方式: "next_open"（翌営業日始値）/ "signal_close"（シグナル日終値）
  # 同日に損切り・利確の両方に触れた場合は損切りを優先（保守的）

  # --- ポートフォリオ制約（portfolio_backtest.py で使用） ---
  max_concurrent: 5        # 同時保有銘柄数の上限
  max_total_risk_r: 5.0    # 合計リスク上限（R単位。各建玉は1R=stop_pctのリスク）
  priority: "rsi_asc"      # 候補が上限超のときの採用優先順位（rsi_asc=RSIが低い＝押し目が深い順）

  # --- 現実寄りの約定（realistic モード） ---
  cost_round_trip: 0.002   # 手数料＋スリッページの往復合計（0.2%）。各トレードの損益から控除
  # gap_fill（翌始値が損切り/利確価格を抜けていればその始値で約定）は realistic モードで有効

# --- マクロ・フィルタ ---
macro:
  n225_symbol: "^N225"    # 日経平均
  n225_ma: 200            # 日経の長期移動平均（200日線）
  vix_symbol: "^VIX"      # VIX指数
  vix_warn: 25.0          # これを超えたら「新規半減」警告
  vix_halt: 30.0          # これを超えたら「新規停止」警告
